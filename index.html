<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2 class="logo">Dashboard</h2>

            <nav class="nav">
                <ul>
                    <li>Home</li>
                    <li>Profile</li>
                    <li>Messages</li>
                    <li>History</li>
                    <li>Tasks</li>
                    <li>Communities</li>
                </ul>
            </nav>

            <nav class="nav">
                <ul>
                    <li>Settings</li>
                    <li>Support</li>
                    <li>Privacy</li>
                </ul>
            </nav>

        </aside>

        <header class="header">
            <div class="top-header">
                <input type="text" name="" id="" placeholder="Search...">
                <div class="profile">Morgan Oakley</div>
            </div>

            <div class="bottom-header">
                <div class="greeting">
                    <div>
                        <p>Hi there,</p>
                        <h3>Morgan Oakley (@morgan)</h3>
                    </div>
                </div>

                <div class="buttons">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="projects">
                <h3>Your Projects</h3>
                <div class="project-grid">
                    
                </div>
            </div>
        </main>
    </div>
</body>
</html>
